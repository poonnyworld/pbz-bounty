# Run HonorBot Bounty in a container.
# Copy .env.example to .env and set DISCORD_TOKEN, MONGO_URI, and Bounty channel IDs.
# MONGO_URI can point to host MongoDB (e.g. mongodb://host.docker.internal:27017/honorbot)
# or a MongoDB container on the same network.

services:
  honorbot-bounty:
    build: .
    image: honorbot-bounty:latest
    container_name: honorbot-bounty
    env_file: .env
    restart: unless-stopped
    # If MongoDB runs on host, use host.docker.internal (Mac/Windows) or host network
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"

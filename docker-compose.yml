# ใช้ MongoDB ของ honor-points-service — รัน honor-points-service ก่อน แล้วรัน compose นี้
services:
  honorbot-bounty:
    build: .
    image: honorbot-bounty:latest
    container_name: honorbot-bounty
    env_file: .env
    environment:
      - MONGO_URI=mongodb://mongodb:27017/honorbot
    restart: unless-stopped
    networks:
      - honor-points-network

networks:
  honor-points-network:
    external: true
    name: honor-points-service_honor-points-network
